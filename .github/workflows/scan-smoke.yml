name: Scan Smoke

# End-to-end smoke tests for the tools/ scan scripts that the fast control-tests
# job cannot cover: it runs the profile directly and never exercises the real
# scan pipelines (image export/extraction, overlay/live filesystem access, the
# docker:// transport's busybox find tiers, and HTML report generation). These
# are heavier (pull images, start containers) and depend on floating :latest
# images, so they run on a weekly schedule — to catch an upstream
# busybox/auditor image regressing a scan independent of repo changes — plus on
# demand and on PRs that touch the find logic or the scan tooling.
#
# One matrixed job per entry (all run identically: ubuntu-latest, unprivileged,
# Docker socket + host Ruby for the --use-local-profile HTML step). Two kinds of
# entry: a scan-mode smoke (does each mode work end-to-end?) and an input-file
# override check (does --input-file reach the auditor for each script?). Each
# entry's target image, selection, and assertions live in its spec.
on:
  workflow_dispatch:
  schedule:
    # Weekly, Mondays 07:17 UTC. Catches floating-:latest image regressions
    # (the same class of failure as the cinc-auditor 7.x control-discovery break).
    - cron: '17 7 * * 1'
  pull_request:
    paths:
      - 'libraries/find_helper.rb'
      - 'tools/**'
      - 'test/spec/integration/**'
      - '.github/workflows/scan-smoke.yml'

permissions: {}

jobs:
  scan-smoke:
    if: ${{ github.repository == 'chainguard-dev/chainguard-inspec' }}
    runs-on: ubuntu-latest
    # Needs the Docker socket (the scans drive Docker) and Ruby — for rspec and
    # for the HTML report generator, which runs with host Ruby under
    # --use-local-profile.
    permissions:
      contents: read
    strategy:
      # Run every mode even if one fails, so a single flaky/regressed mode does
      # not mask the status of the others.
      fail-fast: false
      matrix:
        # spec = the integration smoke; mode = a short label for the job name.
        # override_script (override entries only) = the scan script the override
        # spec should exercise, passed through SCAN_SMOKE_OVERRIDE_SCRIPT.
        include:
          # -- scan-mode smokes: does each mode work end-to-end? --
          # docker:// transport — the only mode exercising FindHelper's busybox
          # Tier 3 against a distroless target.
          - mode: docker-transport
            spec: docker_transport_smoke_spec.rb
          # Filesystem reconstruction (docker export | tar) — the portable
          # default. Unprivileged here, so it asserts ownership-independent
          # results only (see the spec).
          - mode: filesystem
            spec: filesystem_scan_smoke_spec.rb
          # Overlay merged-dir scan — reads the overlay2 merged dir in place
          # (Linux + overlay2; the spec skips otherwise).
          - mode: overlay
            spec: overlay_scan_smoke_spec.rb
          # Live container scan — --pid=host over /proc/<PID>/root of the running
          # target (which must stay up; the spec uses nginx).
          - mode: live
            spec: live_scan_smoke_spec.rb
          # -- input-file override: does --input-file reach the auditor for each
          #    script? One entry per script (each has its own --input-file arg
          #    parser + bind mount); the spec selects it via the env below. --
          - mode: override:filesystem
            spec: input_file_override_smoke_spec.rb
            override_script: cinc-chainguard.sh
          - mode: override:docker-transport
            spec: input_file_override_smoke_spec.rb
            override_script: cinc-chainguard-docker-transport.sh
          - mode: override:overlay
            spec: input_file_override_smoke_spec.rb
            override_script: cinc-chainguard-overlay.sh
          - mode: override:live
            spec: input_file_override_smoke_spec.rb
            override_script: cinc-chainguard-live.sh
    name: scan-smoke (${{ matrix.mode }})
    env:
      # Public Chainguard cinc-auditor image; override CINC_AUDITOR_IMAGE to use
      # an alternate. (The scan pipeline is image-agnostic, so the smokes run on
      # this one image; control-tests.yml verifies the profile on both images.)
      CINC_AUDITOR_IMAGE: cgr.dev/chainguard/cinc-auditor:latest
      RUN_SCAN_SMOKE: '1'
      # Empty for scan-mode entries (those specs ignore it); set to the target
      # script for override entries. Static workflow literal (no untrusted input).
      SCAN_SMOKE_OVERRIDE_SCRIPT: ${{ matrix.override_script }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
        with:
          working-directory: test
          bundler-cache: true
          ruby-version: '3.4'

      - name: Install rexml (host gem for the HTML report generator)
        # The scan script's --use-local-profile HTML step runs plain host `ruby`
        # and requires rexml (via libraries/stig_mappings.rb). Ruby 3.4 dropped
        # rexml from its default gems, so install it globally. (Tracked upstream
        # as a scan-tooling robustness gap.)
        run: gem install --no-document rexml

      - name: Scan smoke (${{ matrix.mode }})
        # Runs this entry's integration spec, which drives the real tools/ scan
        # script(s) and asserts on the results (mode entries: controls
        # discovered, find enumerated files, verdicts correct; override entries:
        # the --input-file value reaches the auditor). matrix.spec is a static
        # workflow literal (no untrusted input).
        working-directory: test
        run: bundle exec rspec spec/integration/${{ matrix.spec }}
