name: Control Tests

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'controls/**'
      - 'libraries/**'
      - 'test/**'
      - 'tools/**'
      - 'inspec.yml'
      - '.github/workflows/control-tests.yml'

permissions: {}

jobs:
  test:
    if: ${{ github.repository == 'chainguard-dev/chainguard-inspec' }}
    runs-on: ubuntu-latest
    # Non-root runner with passwordless sudo and Docker available.
    # A container: job is intentionally avoided — it would prevent Docker-in-Docker
    # access needed for cinc-auditor when using the Docker execution mode.
    permissions:
      contents: read
    strategy:
      # Run the suite against both auditor images so a divergence between the
      # primary public Chainguard image and the upstream cincproject image is
      # caught. fail-fast: false so one image's failure doesn't mask the other.
      fail-fast: false
      matrix:
        include:
          - name: chainguard
            image: cgr.dev/chainguard/cinc-auditor:latest
          - name: cincproject
            image: cincproject/auditor:latest
    name: test (${{ matrix.name }})
    env:
      # Primary is the public Chainguard image; the matrix also exercises the
      # upstream cincproject image. matrix.image is a static workflow literal
      # (no untrusted input).
      CINC_AUDITOR_IMAGE: ${{ matrix.image }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run tools shell tests
        # Exercises tools/lib/cinc-common.sh helpers against real (tiny)
        # containers; needs only Docker and the public Chainguard wolfi-base image.
        run: bash test/tools/cinc_require_target_running_test.sh

      - uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          working-directory: test
          bundler-cache: true
          ruby-version: '3.4' # Not needed with a .ruby-version, .tool-versions or mise.toml

      - name: Run generate_stig_html.rb UTF-8 regression test
        # Runs after ruby 3.4 is set up so it uses a json gem strict enough to
        # surface the C/POSIX-locale encoding bug (older system rubies do not).
        run: bash test/tools/generate_stig_html_test.sh

      - name: Validate profile (cinc-auditor check + exec discovers controls)
        run: |
          # Validate a clean profile dir (inspec.yml + controls/ + libraries/),
          # not the repo root: cinc-auditor 7.x discovers no controls when the
          # profile path also contains non-profile trees such as test/vendor.
          stage="$(mktemp -d)"; results="$(mktemp -d)"; scan="$(mktemp -d)"; chmod 777 "$results"
          cp "$GITHUB_WORKSPACE/inspec.yml" "$stage/"
          cp -a "$GITHUB_WORKSPACE/controls" "$GITHUB_WORKSPACE/libraries" "$stage/"
          # --user 0:0 so this works regardless of the auditor image's default
          # user: the Chainguard image runs as nonroot and otherwise can't read
          # the root-owned, read-only /profile bind mount (cincproject defaults
          # to root). Matches the scan scripts and rspec harness.
          docker run --rm --platform linux/amd64 --user 0:0 \
            -v "$stage:/profile:ro" \
            "$CINC_AUDITOR_IMAGE" check /profile
          # Beyond `check`: exec the profile and assert controls were actually
          # discovered. A control-less profile (the inspec#7934 failure mode)
          # passes `check` with only a warning, so `check` alone is not enough.
          # rootfs points at an empty dir: we only need controls *discovered*, not
          # evaluated. Default rootfs=/ would scan the auditor image's own root fs
          # (LibraryPermissions' find /usr/lib + per-file checks over the Ruby/gem
          # tree) — pathologically slow on the larger Chainguard image.
          docker run --rm --platform linux/amd64 --user 0:0 \
            -v "$stage:/profile:ro" -v "$scan:/scan-root:ro" -v "$results:/results:rw" \
            "$CINC_AUDITOR_IMAGE" exec /profile --no-create-lockfile \
            --input rootfs=/scan-root --reporter json:/results/out.json >/dev/null 2>&1 || true
          n="$(jq '.profiles[0].controls | length' "$results/out.json" 2>/dev/null || echo 0)"
          echo "Controls discovered by exec: $n"
          [ "$n" -gt 0 ] || { echo "ERROR: profile exec discovered zero controls (inspec#7934 regression)"; exit 1; }

      - name: Run control tests
        working-directory: test
        run: bundle exec rspec
