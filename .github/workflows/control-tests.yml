name: Control Tests

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'controls/**'
      - 'test/**'
      - 'inspec.yml'
      - '.github/workflows/control-tests.yml'

permissions: {}

jobs:
  test:
    if: ${{ github.repository == 'chainguard-dev/chainguard-inspec' }}
    runs-on: ubuntu-latest
    # Non-root runner with passwordless sudo and Docker available.
    # A container: job is intentionally avoided — it would prevent Docker-in-Docker
    # access needed for cinc-auditor when using the Docker execution mode.
    permissions:
      contents: read
    env:
      # If and when we make the cinc-auditor image public, convert to it.
      # CINC_AUDITOR_IMAGE: cgr.dev/chainguard/cinc-auditor
      CINC_AUDITOR_IMAGE: cincproject/auditor:latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          working-directory: test
          bundler-cache: true
          ruby-version: '3.4' # Not needed with a .ruby-version, .tool-versions or mise.toml

      # TEMPORARY DIAGNOSTIC (revert after capturing evidence): probe what
      # cinc-auditor 7.x writes to the JSON reporter inside the runner.
      - name: DEBUG cinc 7.x reporter probe
        run: |
          set -x
          docker run --rm --platform linux/amd64 --entrypoint cinc-auditor "$CINC_AUDITOR_IMAGE" version || true
          docker version || true
          docker info --format 'storage={{.Driver}} server={{.ServerVersion}}' || true
          fix="$(mktemp -d)"; res="$(mktemp -d)"; chmod 777 "$res"
          mkdir -p "$fix/proc/sys/kernel"
          printf '2\n' > "$fix/proc/sys/kernel/randomize_va_space"
          set +e
          echo "=== A) controls dir as seen inside the container ==="
          docker run --rm --platform linux/amd64 --user 0:0 -v "$GITHUB_WORKSPACE:/profile:ro" \
            --entrypoint sh "$CINC_AUDITOR_IMAGE" -c 'id; ls -la /profile/controls | head; echo "count="; ls /profile/controls/*.rb | wc -l; head -3 /profile/inspec.yml'
          probe() {
            local tag="$1"; shift
            rm -rf "$res"; mkdir -p "$res"; chmod 777 "$res"
            docker run --rm --platform linux/amd64 --user 0:0 "$@" \
              -v "$GITHUB_WORKSPACE:/profile:ro" -v "$fix:/fixture:ro" -v "$res:/results" \
              "$CINC_AUDITOR_IMAGE" exec /profile --controls aslr-runtime-check \
              --reporter json:/results/output.json --no-create-lockfile --input rootfs=/fixture -l debug 2>"/tmp/${tag}.err"
            echo "$tag EXIT=$? controls_json=$(grep -o '"controls":\[[^]]*\]' "$res/output.json" 2>/dev/null | head -c 60)"
            echo "  Loading lines: $(grep -c 'into #<Inspec::ProfileContext' "/tmp/${tag}.err")"
            grep -iE 'supports_platform|skipping|unsupported|signature|unsigned|cannot|no such' "/tmp/${tag}.err" | head -3
          }
          echo "=== B) baseline (reproduce) ==="; probe baseline
          echo "=== B-full) complete -l debug trace of baseline run ==="
          grep -aE 'DEBUG|WARN|ERROR|Loading|fetch|git|Resolve|Reading|source|glob|dubious|ownership|safe.directory' /tmp/baseline.err | head -80
          echo "=== E) profile copied to a root-owned, .git-stripped dir ==="
          pcopy="$(mktemp -d)"; cp -a "$GITHUB_WORKSPACE/." "$pcopy/"; rm -rf "$pcopy/.git"; chown -R 0:0 "$pcopy" 2>/dev/null || sudo chown -R 0:0 "$pcopy"
          rm -rf "$res"; mkdir -p "$res"; chmod 777 "$res"
          docker run --rm --platform linux/amd64 --user 0:0 \
            -v "$pcopy:/profile:ro" -v "$fix:/fixture:ro" -v "$res:/results" \
            "$CINC_AUDITOR_IMAGE" exec /profile --controls aslr-runtime-check \
            --reporter json:/results/output.json --no-create-lockfile --input rootfs=/fixture -l debug 2>/tmp/ecopy.err
          echo "E EXIT=$? controls_json=$(grep -o '"controls":\[[^]]*\]' "$res/output.json" 2>/dev/null | head -c 60)"
          echo "E Loading lines: $(grep -c 'into #<Inspec::ProfileContext' /tmp/ecopy.err)"
          set -e
          echo "=== END PROBE ==="

      - name: Validate profile (cinc-auditor check)
        if: always()
        run: |
          docker run --rm --platform linux/amd64 \
            -v "$GITHUB_WORKSPACE:/profile:ro" \
            "$CINC_AUDITOR_IMAGE" check /profile

      - name: Run control tests
        working-directory: test
        env:
          INSPEC_DEBUG: '1'
        run: bundle exec rspec spec/controls/aslr_check_spec.rb
