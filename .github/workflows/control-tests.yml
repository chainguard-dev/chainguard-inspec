name: Control Tests

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'controls/**'
      - 'test/**'
      - 'inspec.yml'

permissions: {}

jobs:
  test:
    if: ${{ github.repository == 'chainguard-dev/chainguard-inspec' }}
    runs-on: ubuntu-latest
    # Non-root runner with passwordless sudo and Docker available.
    # A container: job is intentionally avoided — it would prevent Docker-in-Docker
    # access needed for cinc-auditor when using the Docker execution mode.
    permissions:
      contents: read
    env:
      # If and when we make the cinc-auditor image public, convert to it.
      # CINC_AUDITOR_IMAGE: cgr.dev/chainguard/cinc-auditor
      CINC_AUDITOR_IMAGE: cincproject/auditor:latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@0cb964fd540e0a24c900370abf38a33466142735 # v1.305.0
        with:
          working-directory: test
          bundler-cache: true
          ruby-version: '3.4' # Not needed with a .ruby-version, .tool-versions or mise.toml

      - name: Run control tests
        working-directory: test
        run: bundle exec rspec
