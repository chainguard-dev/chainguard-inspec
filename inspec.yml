name: chainguard_stig_v3r2
title: Chainguard GPOS STIG Compliance Profile
maintainer: steve.beattie@chainguard.dev
copyright: Copyright (c) 2025 Chainguard
license: Apache-2.0
summary: DISA STIG compliance validation for Chainguard container images
version: 0.0.4
supports:
  - platform: linux

inputs:
  - name: expected_cacert_hash
    # The default is the SHA-256 of the stock ca-certificates bundle at the
    # current release (not a per-image value). Override it when the image is
    # customized with packages that add further certificates, changing the hash.
    description: Expected SHA-256 hash of CA bundle
    type: string
    required: true
    value: 61efbd6d3f829f71039c57b29dd37d15ac7f33c4ece861aaef8c7d7a519cd1d9
  - name: rootfs
    # Defaults to / on purpose: when running over a transport (docker:// against
    # a container, or ssh:// to a VM) the profile should evaluate from the root
    # of the target. Override it when evaluating a filesystem staged on the host
    # — e.g. an extracted rootfs, or docker's mounted overlay merged directory.
    description: Path to extracted container root filesystem
    type: string
    required: true
    value: /
  - name: allowed_repositories
    # A repository is allowed when its host equals, or is a subdomain of, one
    # of these domains (so customer subdomains need no enumeration). Scheme and
    # path are not matched (HTTPS is required separately); an empty list allows
    # no repositories. Entries may be bare domains or full URLs (only the host
    # is used).
    description: Approved package repository domains (host or parent domain)
    type: array
    required: true
    value:
      - apk.cgr.dev
      - virtualapk.cgr.dev
      - packages.cgr.dev
      - packages.wolfi.dev
  - name: allowed_extra_users
    # user added by apko as part of the image build should be detected
    # and considered allowed automatically.
    description: List of allowed added users in the environment
    type: array
    required: true
    value:
      - _apt
      - messagebus
      - nonroot
  - name: banned_remote_packages
    description: Packages that must not be present in the APK database
    type: array
    required: true
    value:
      - openssh
      - openssh-server
      - openssh-client
      - openssh-sftp-server
      - dropbear
      - tigervnc
      - tigervnc-server
      - tigervnc-viewer
      - xrdp
      - xorgxrdp
      - vsftpd
      - proftpd
      - webmin
      - cockpit
      - cockpit-ws
  - name: skip_fips_checks
    description: Skip exercising the checks for FIPS-approved crytpography
    type: Boolean
    value: false
  - name: allow_host_aslr_fallback
    description: >
      Allow AslrCheck to fall back to reading /proc/sys/kernel/randomize_va_space
      directly from the host when neither the rootfs-relative sysctl path nor the
      runtime capture file is present.  Enable for overlay scans where /proc is not
      mounted inside the merged filesystem and the capture file cannot be injected.
      Disabled by default so that synthetic test environments on a live host do not
      inadvertently satisfy the check via the host kernel.
    type: Boolean
    value: false
