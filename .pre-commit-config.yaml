repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        language: system
        entry: shellcheck
        args: [-s, bash, -x, -P, tools]
        types: [shell]

      - id: ruby-syntax-check
        name: ruby syntax check
        language: system
        entry: rubocop
        args: [--only, Lint/Syntax, --format, simple]
        types: [ruby]

      - id: rubocop
        name: rubocop
        language: system
        entry: rubocop
        types: [ruby]
        stages: [manual]
